<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudina Hernández</title>
    
    <style>
        /* FUENTES LOCALES */
        @font-face {
            font-family: 'Montserrat';
            font-style: normal;
            font-weight: 700;
            src: url('/fonts/Montserrat-Bold.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Source Serif 4';
            font-style: normal;
            font-weight: 400;
            src: url('/fonts/SourceSerif4-Regular.ttf') format('truetype');
        }

        :root {
            --lt-bg: #254f1a; /* Verde oscuro clásico de Linktree, cámbialo si prefieres otro */
            --lt-button-bg: #ffffff;
            --lt-button-text: #254f1a;
            --lt-text-white: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Source Serif 4', serif;
            background-color: var(--lt-bg); /* Fondo sólido */
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 580px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Foto de perfil estilo Linktree */
        .profile-pic {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            margin-bottom: 16px;
            object-fit: cover;
            background-color: #eee;
        }

        .username {
            font-family: 'Montserrat', sans-serif;
            color: var(--lt-text-white);
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .description {
            color: var(--lt-text-white);
            font-size: 1rem;
            font-weight: 400;
            margin-bottom: 32px;
            text-align: center;
            opacity: 0.9;
        }

        /* Contenedor de botones */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Botón estilo Linktree */
        .link-btn {
            background-color: var(--lt-button-bg);
            color: var(--lt-button-text);
            text-decoration: none;
            padding: 20px 24px;
            border-radius: 30px; /* Bordes muy redondeados */
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            text-align: center;
            transition: transform 0.15s cubic-bezier(0, 0.2, 0.5, 3), box-shadow 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: none;
        }

        .link-btn:hover {
            transform: scale(1.02);
            background-color: #f9f9f9;
        }

        .link-btn:active {
            transform: scale(0.98);
        }

        .footer-logo {
            margin-top: auto;
            padding-top: 60px;
            color: var(--lt-text-white);
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            opacity: 0.8;
            letter-spacing: -1px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="img/perfil.jpg" alt="Claudina Hernández" class="profile-pic">
    
    <div class="username">@claudinahernandez</div>
    <div class="description">41 años dedicados a la pedagogía musical y neurociencia aplicada.</div>

    <div class="links-container">
        <a href="musica_popular_wiki.html" class="link-btn">Wiki de Música Popular</a>
        <a href="didactica_modulo_2.html" class="link-btn">Didáctica / Módulo 2</a>
    </div>

    <div class="footer-logo">Claudina Hernández</div>
</div>

</body>
</html>
